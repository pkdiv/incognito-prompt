<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=320" />
  <title>Incognito Prompt</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #1a1a2e;
      background: #f8f9fa;
      padding: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 span { color: #6c63ff; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .toggle-row label { font-weight: 500; }
    .switch {
      position: relative;
      width: 38px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .switch .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      cursor: pointer;
      transition: background .2s;
    }
    .switch .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform .2s;
    }
    .switch input:checked + .slider { background: #6c63ff; }
    .switch input:checked + .slider::before { transform: translateX(16px); }
    .mode-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .mode-row button {
      flex: 1;
      padding: 6px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }
    .mode-row button.active {
      border-color: #6c63ff;
      background: #6c63ff;
      color: #fff;
    }
    .status {
      font-size: 11px;
      color: #666;
      margin-bottom: 12px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .actions a {
      font-size: 12px;
      color: #6c63ff;
      text-decoration: none;
      cursor: pointer;
    }
    .actions a:hover { text-decoration: underline; }
    hr { border: none; border-top: 1px solid #e0e0e0; margin: 12px 0; }
    .badge {
      font-size: 10px;
      color: #fff;
      background: #6c63ff;
      border-radius: 4px;
      padding: 1px 6px;
    }
  </style>
</head>
<body>
  <h1><span>✦</span> Incognito Prompt</h1>

  <div class="toggle-row">
    <label for="enabled">Enabled</label>
    <div class="switch">
      <input type="checkbox" id="enabled" />
      <span class="slider"></span>
    </div>
  </div>

  <div class="mode-row">
    <button data-mode="universal" class="active">All Sites</button>
    <button data-mode="selected">Selected</button>
  </div>

  <div class="status" id="status">Active on all LLM sites</div>

  <hr />

  <div class="actions">
    <a id="openOptions">⚙ Settings &amp; Custom Matchlist</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
